# poolcare marketing site — production vhost (HTTPS).
# Cert: /etc/letsencrypt/live/poolcare.africa/ (SAN: apex + www).
# www redirects to the apex so canonicals stay single-origin (SEO).

# ===== HTTP -> HTTPS (keeps the ACME location for renewals) =====
server {
    listen 80;
    server_name poolcare.africa www.poolcare.africa;
    location /.well-known/acme-challenge/ { root /var/www/acme; }
    location / { return 301 https://poolcare.africa$request_uri; }
}

# ===== www -> apex =====
server {
    listen 443 ssl;
    server_name www.poolcare.africa;

    ssl_certificate     /etc/letsencrypt/live/poolcare.africa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poolcare.africa/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://poolcare.africa$request_uri;
}

# ===== marketing site (Next.js SSR, container 127.0.0.1:3130) =====
server {
    listen 443 ssl;
    server_name poolcare.africa;

    ssl_certificate     /etc/letsencrypt/live/poolcare.africa/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/poolcare.africa/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 15m;

    location / {
        proxy_pass http://127.0.0.1:3130;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
