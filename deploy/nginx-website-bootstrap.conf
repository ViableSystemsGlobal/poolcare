# poolcare marketing site — bootstrap vhost (HTTP only, pre-TLS).
# Serves the ACME challenge so certbot can issue once DNS points here, and
# proxies everything else to the container so the site can be verified over
# plain HTTP before the certificate exists.
# Replaced by nginx-website.conf (HTTPS) after issuance.
server {
    listen 80;
    server_name poolcare.africa www.poolcare.africa;

    location /.well-known/acme-challenge/ { root /var/www/acme; }

    location / {
        proxy_pass http://127.0.0.1:3130;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
